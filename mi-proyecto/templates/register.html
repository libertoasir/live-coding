<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Gestor de Notas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
</head>
<body class="container" style="margin-top: 50px;">
    <article style="max-width: 400px; margin: auto;">
        <header><strong>Registro de Usuario</strong></header>
        <form method="POST">
            <label>Elige un Usuario</label>
            <input type="text" name="username" required>
            <label>Elige una Contraseña</label>
            <input type="password" name="password" required>
            <button type="submit" class="secondary">Registrarse</button>
        </form>
        <footer>
            <a href="/login">Ya tengo cuenta</a>
        </footer>
    </article>
</body>
</html>
