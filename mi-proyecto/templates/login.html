<!DOCTYPE html>
<html lang="es">
<head> 
    <meta charset="UTF-8">
    <title>Login - Gestor de Notas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
</head>
<body class="container" style="margin-top: 50px;">
    <article style="max-width: 400px; margin: auto;">
        <header><strong>Iniciar Sesión</strong></header>
        <form method="POST">
            <label>Usuario</label>
            <input type="text" name="username" placeholder="Tu usuario" required>
            <label>Contraseña</label>
            <input type="password" name="password" placeholder="********" required>
            <button type="submit">Entrar</button>
        </form>
        <footer>
            <a href="/register">Crear una cuenta nueva</a>
        </footer>
    </article>
</body>
</html>
